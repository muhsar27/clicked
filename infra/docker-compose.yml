version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clicked
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # #49 — Healthcheck so dependants (and `docker compose up --wait`) can
    # gate on database readiness instead of racing the boot.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clicked"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # #49 — Healthcheck via `redis-cli ping`. Same cadence as postgres so a
    # single `docker compose up --wait` reports both as `(healthy)` together.
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2s

  # #223 — S3-compatible object storage (MinIO). Swap env vars to target AWS S3
  # or Cloudflare R2 in production; the backend uses the same S3 client path.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clicked
      MINIO_ROOT_PASSWORD: clickedsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Create the application bucket on first boot with a private ACL (no anonymous
  # read). Re-runs are idempotent via --ignore-existing.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 clicked clickedsecret &&
      mc mb --ignore-existing local/clicked &&
      mc anonymous set none local/clicked
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
